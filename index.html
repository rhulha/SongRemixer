<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mr. Sandman Beat Editor</title>
<link rel="icon" href="favicon.ico">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d0d1a;
  color: #ccc;
  font-family: monospace;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}
#toolbar {
  padding: 6px 10px;
  background: #141428;
  border-bottom: 1px solid #252545;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}
button {
  background: #1e1e3a;
  color: #ccc;
  border: 1px solid #383868;
  padding: 4px 10px;
  cursor: pointer;
  font-family: monospace;
  font-size: 12px;
}
button:hover { background: #2a2a50; }
#sep { width: 1px; background: #2a2a4a; height: 18px; margin: 0 2px; }
#status { color: #555; margin-left: 8px; }
#canvas-wrap { flex: 1; overflow: hidden; display: flex; }
canvas { display: block; flex: 1; min-width: 0; height: 100%; cursor: crosshair; }
#marker-list {
  width: 148px;
  flex-shrink: 0;
  background: #0a0a18;
  border-left: 1px solid #252545;
  overflow-y: auto;
  overflow-x: hidden;
  font-size: 11px;
}
#marker-list::-webkit-scrollbar { width: 6px; }
#marker-list::-webkit-scrollbar-track { background: #080810; }
#marker-list::-webkit-scrollbar-thumb { background: #2a2a50; border-radius: 3px; }
.mli {
  padding: 4px 7px;
  cursor: pointer;
  border-bottom: 1px solid #151528;
  color: #888;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mli:hover { background: #14142a; color: #bbb; }
.mli.sel { background: #1e1e3a; color: #fff; }
#sb-track { height: 12px; background: #080810; border-top: 1px solid #252545; position: relative; flex-shrink: 0; }
#sb-thumb { position: absolute; top: 1px; bottom: 1px; background: #2a2a50; border-radius: 2px; cursor: grab; min-width: 16px; }
#sb-thumb:active { cursor: grabbing; background: #383868; }
#panel {
  flex-shrink: 0;
  height: 44px;
  background: #141428;
  border-top: 1px solid #252545;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 18px;
}
#panel-pos { color: #666; min-width: 220px; }
#panel-sample-wrap { display: none; align-items: center; gap: 6px; color: #666; min-width: 220px; }
#sample-edit {
  background: #0a0a18;
  color: #fff;
  border: 1px solid #383868;
  padding: 2px 6px;
  font-family: monospace;
  font-size: 13px;
  width: 90px;
}
#sample-edit:focus { outline: none; border-color: #6060a0; }
#panel-time { color: #666; }
#sound-checks { display: flex; gap: 14px; }
.sc { display: flex; align-items: center; gap: 5px; cursor: pointer; }
.sc input { cursor: pointer; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
#btn-del { margin-left: auto; color: #c04040; border-color: #6a2020; }
#btn-del:hover { background: #2a1010; }
</style>
</head>
<body>
<div id="toolbar">
  <button id="btn-wav">Load WAV</button>
  <button id="btn-play" disabled>&#9654; Play</button>
  <button id="btn-add">Add Marker</button>
  <div id="sep"></div>
  <button id="btn-load">Load</button>
  <button id="btn-save">Save</button>
  <input id="in-wav"  type="file" accept=".wav"  hidden>
  <input id="in-json" type="file" accept=".json" hidden>
  <span id="status"></span>
</div>
<div id="canvas-wrap">
  <canvas id="cv"></canvas>
  <div id="marker-list"></div>
</div>
<div id="sb-track"><div id="sb-thumb"></div></div>
<div id="panel">
  <span id="panel-pos">load a wav to begin</span>
  <span id="panel-sample-wrap">sample <input id="sample-edit" type="number" min="0" step="1"> <span id="panel-time"></span></span>
  <div id="sound-checks"></div>
  <button id="btn-del" style="display:none">Delete</button>
</div>
<script type="module" src="app.js"></script>
</body>
</html>
